<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Ruba</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  background:linear-gradient(45deg,#ff4d6d,#ff99ac);
  font-family:Arial;
  padding:20px;
  overflow:hidden;
}

.envelope{
  width:130px;
  height:100px;
  margin:10px;
  background:rgba(255,255,255,0.25);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  position:relative;
  color:white;
}

.envelope:hover{
  transform:scale(1.05);
}

.envelope.opened{
  background:white;
  color:#ff4d6d;
}

.icon{
  font-size:28px;
}

.date{
  font-size:12px;
  margin-top:4px;
  opacity:0.9;
}

.inner-msg{
  display:none;
  font-size:12px;
  text-align:center;
  padding:5px;
}

.envelope.opened .inner-msg{
  display:block;
}

.envelope.opened .icon{
  display:none;
}

/* 💖 hearts */
.heart{
  position:fixed;
  color:white;
  font-size:18px;
  animation:float 3s linear forwards;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<!-- 1 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">حبك</div>
  <div class="inner-msg">إنتِ أجمل شي صار بحياتي 💖</div>
</div>

<!-- 2 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">قلب</div>
  <div class="inner-msg">وجودك بيخلي حياتي احلى 💞</div>
</div>

<!-- 3 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">اشتياق</div>
  <div class="inner-msg">بشتقلك بكل لحظة 🌸</div>
</div>

<!-- 4 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">أمان</div>
  <div class="inner-msg">معك بحس بالأمان 💫</div>
</div>

<!-- 5 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">حب</div>
  <div class="inner-msg">بحبك أكتر من كل شي 💖</div>
</div>

<!-- 6 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">حياة</div>
  <div class="inner-msg">إنتِ قلبي وروحي 💕</div>
</div>

<!-- 7 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">قدر</div>
  <div class="inner-msg">بموت فيكي 💗</div>
</div>

<!-- 8 -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">ذكرى</div>
  <div class="inner-msg">كل لحظة معك بتسوى الدنيا كلها 💌</div>
</div>

<!-- 9 SPECIAL -->
<div class="envelope" onclick="openEnv(this)">
  <div class="icon">💌</div>
  <div class="date">25/04/2025</div>
  <div class="inner-msg">هيدا صار تاريخ ميلادي يا قلبي 💖</div>
</div>

<script>

function openEnv(el){
  el.classList.toggle("opened");
  createHearts(el);
}

/* 💖 hearts from envelope */
function createHearts(el){
  const rect = el.getBoundingClientRect();

  for(let i=0;i<10;i++){
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";

    h.style.left = (rect.left + rect.width/2) + "px";
    h.style.top = rect.top + "px";
    h.style.position = "fixed";

    h.style.fontSize = (Math.random()*20+10)+"px";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),3000);
  }
}

</script>

</body>
</html>
