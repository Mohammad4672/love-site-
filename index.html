<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Love Game لـ Ruba</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at top,#ff4d6d,#6a0572);
  font-family: Arial;
  overflow:hidden;
  color:white;
  text-align:center;
}

h1{
  animation: glow 2s infinite;
}

@keyframes glow{
  0%{text-shadow:0 0 5px #fff;}
  50%{text-shadow:0 0 25px #fff;}
  100%{text-shadow:0 0 5px #fff;}
}

button{
  padding:12px 18px;
  border:none;
  border-radius:15px;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
}

.level{
  background:white;
  color:#6a0572;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  color:#6a0572;
  padding:25px;
  border-radius:20px;
  width:80%;
  max-width:320px;
  transition:0.3s;
}

.popup.show{
  transform:translate(-50%,-50%) scale(1);
}

.heart{
  position:absolute;
  animation: float 4s linear forwards;
}

@keyframes float{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-700px); opacity:0;}
}
</style>
</head>

<body>

<h1>💌 Love Game - Ruba 💌</h1>

<!-- Levels -->
<button class="level" onclick="openLevel(1)">Level 1 💖</button>
<button class="level" onclick="openLevel(2)">Level 2 💘</button>
<button class="level" onclick="openLevel(3)">Level 3 💌</button>

<div class="popup" id="popup">
  <div id="text"></div>
  <button onclick="closePopup()">إغلاق</button>
</div>

<script>
const levels = {
  1: [
    "عمري، إنتِ بداية كل شي حلو بحياتي 💖",
    "ضحكتك بتكفيني عن الدنيا كلها 🫶",
    "ما تضايقي حالك من شي يا قلبي  💘"
  ],

  2: [
    "انتِ احلى شي صار بحياتي ❤️",
    "بحبك بطريقة عنجد ما بتنوصف 💞",
    "كل يوم معك هو حياة جديدة إلي 💖"
  ],

  3: [
    "💌 رسالة سرّية:",
    "قلبي ... إذا وصلتي لهون يعني إنتِ الشخص الوحيد اللي قلبي اختاره ❤️",
    "أنا ما بدي شي من الدنيا غيرك إنتِ 💘",
    "Forever you, Ruba ♾️"
  ]
};

function openLevel(lvl){
  let arr = levels[lvl];
  let msg = arr[Math.floor(Math.random()*arr.length)];

  document.getElementById("text").innerText = msg;
  document.getElementById("popup").classList.add("show");

  hearts();
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

function hearts(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.top="80vh";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),4000);
  }
}
</script>

</body>
</html>
