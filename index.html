<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💌 رُبى</title>

<style>
body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle,#ff4d6d,#1a001f);
  font-family:Arial;
  overflow:hidden;
  color:white;
}

/* 📅 التاريخ */
#memory{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.35);
  padding:10px 14px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 15px rgba(255,77,109,0.5);
  animation:beat 2s infinite;
}

@keyframes beat{
  0%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.1);}
  100%{transform:translateX(-50%) scale(1);}
}

/* 💖 قلوب */
.heart{
  position:absolute;
  color:#ff4d6d;
  font-size:20px;
  animation:floatUp 6s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0.5); opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.2); opacity:0;}
}

/* 🔒 شاشة الدخول */
#login{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

#chat, #buttons{
  display:none;
}

/* 💬 الشات */
#chat{
  position:absolute;
  top:20px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:18px;
  font-size:15px;
  animation:pop 0.3s ease;
  box-shadow:0 0 15px rgba(255,77,109,0.4);
}

.me{
  align-self:flex-end;
  background:#ff4d6d;
  border-bottom-right-radius:5px;
}

@keyframes pop{
  from{transform:scale(0);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* أزرار */
#buttons{
  position:fixed;
  bottom:80px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00ffb3;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- 📅 التاريخ -->
<div id="memory">
📅 ذكرى تعارفنا: 25/04/2025 ⏰ 3:21
</div>

<!-- 🔒 تسجيل دخول -->
<div id="login">
  <p>ادخل كلمة السر 💌</p>
  <input id="pass" placeholder="1542004">
  <br>
  <button onclick="checkPass()">دخول</button>
</div>

<!-- 💬 الشات -->
<div id="chat"></div>

<!-- 🎮 الأزرار -->
<div id="buttons">
<button onclick="sendMsg('أنا بموت برُبى ❤️🔥')">بموت فيها</button>
<button onclick="sendMsg('أنا بعشقها 💖')">بعشقها</button>
</div>

<!-- 🔊 صوت -->
<audio id="heartBeatSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b6f1f4c3b.mp3">
</audio>

<script>

/* 💖 قلوب */
function spawnHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),6000);
  },400);
}

/* 🔑 تحقق كلمة السر */
function checkPass(){
  let p=document.getElementById("pass").value;

  if(p==="lezm la7alk t3rfe lpassword ya albe"){
    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="flex";
    document.getElementById("buttons").style.display="flex";

    spawnHearts();
  } else {
    alert("❌ كلمة السر غلط");
  }
}

/* 🔊 صوت */
function playSound(){
  let s=document.getElementById("heartBeatSound");
  s.currentTime=0;
  s.play();
}

/* 💬 رسائل */
function sendMsg(text){
  playSound();

  let div=document.createElement("div");
  div.className="msg me";
  div.innerText=text;

  document.getElementById("chat").appendChild(div);
}

</script>

</body>
</html>
