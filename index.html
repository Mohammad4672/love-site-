<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 لـ Ruba</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at top,#ff4d6d,#b5179e);
  font-family: Arial, sans-serif;
  overflow:hidden;
  color:white;
  text-align:center;
}

h1{
  font-size:28px;
  animation: glow 2s infinite;
  z-index:2;
}

@keyframes glow{
  0%{text-shadow:0 0 5px #fff;}
  50%{text-shadow:0 0 25px #fff;}
  100%{text-shadow:0 0 5px #fff;}
}

button{
  padding:15px 25px;
  border:none;
  border-radius:25px;
  font-size:18px;
  cursor:pointer;
  background:white;
  color:#b5179e;
  font-weight:bold;
  margin-top:15px;
  z-index:2;
}

input{
  padding:12px;
  border-radius:15px;
  border:none;
  outline:none;
  margin-top:10px;
  text-align:center;
  font-size:16px;
}

.secret{
  display:none;
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  animation: fade 1s ease-in-out;
}

@keyframes fade{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

.heart{
  position:absolute;
  color:white;
  font-size:18px;
  animation: float 4s linear forwards;
}

@keyframes float{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-700px); opacity:0;}
}
</style>
</head>

<body>

<h1 id="msg">💖 رسالة خاصة لـ Ruba 💖</h1>

<button onclick="showLove()">اضغطي هون 💕</button>

<input type="password" id="code" placeholder="اكتبي كلمة السر">

<button onclick="openSecret()">فتح الرسالة السرية 🔐</button>

<div class="secret" id="secretBox">
  <h2>💌 الرسالة السرية</h2>
  <p>
    روبا... إذا وصلتي لهون يعني إنتِ مميزة جدًا 💖<br><br>
    بحبك بطريقة ما بتنشرح، إنتِ كل شي حلو بحياتي ❤️<br>
    وجودك لحالو كافي يخلي يومي أجمل 🫶<br><br>
    💞 I will always choose you, Ruba 💞
  </p>
</div>

<script>
const messages = [
  "روبا، إنتِ دقّة قلبي 💓",
  "كل لحظة بحبك أكتر يا روبا 💖",
  "روبا، إنتِ الأمان تبعي ❤️",
  "ما في حدا بقلبي غيرك يا روبا 💘",
  "روبا، إنتِ أجمل صدفة بحياتي 🫶",
  "بحبك قد السما وما بعدها 💞"
];

function showLove(){
  if(navigator.vibrate){
    navigator.vibrate([300,100,300]);
  }

  document.getElementById("msg").innerText =
    messages[Math.floor(Math.random()*messages.length)];

  for(let i=0;i<25;i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.top = "80vh";
    heart.style.fontSize = (10 + Math.random()*25) + "px";
    document.body.appendChild(heart);

    setTimeout(()=>{ heart.remove(); },4000);
  }
}

function openSecret(){
  let code = document.getElementById("code").value;

  if(code === "Ruba"){
    document.getElementById("secretBox").style.display = "block";
    if(navigator.vibrate){
      navigator.vibrate([200,100,200,100,300]);
    }
  } else {
    alert("❌ كلمة السر غلط");
  }
}
</script>

</body>
</html>
