<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Story</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#ff4d6d,#ff99ac);
  overflow:hidden;
}

/* الكتاب */
.book{
  width:320px;
  height:420px;
  background:white;
  border-radius:15px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  position:relative;
  perspective:1000px;
}

/* الصفحة */
.page{
  position:absolute;
  width:100%;
  height:100%;
  padding:30px;
  box-sizing:border-box;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  flex-direction:column;
  transition:0.8s;
  border-radius:15px;
}

/* القلب */
.heart{
  font-size:50px;
  animation:beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

h1{
  color:#ff2e63;
  margin-bottom:10px;
}

p{
  color:#444;
  font-size:16px;
}

/* زر */
button{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border:none;
  background:#ff2e63;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

/* صفحات متعددة */
#p2,#p3,#p4{
  transform:rotateY(180deg);
  opacity:0;
}
</style>
</head>

<body>

<div class="book">

  <!-- الصفحة 1 -->
  <div class="page" id="p1">
    <div>
      <div class="heart">💖</div>
      <h1>أهلاً يا قلبي</h1>
      <p>هاي مش مجرد رسالة… هاي بداية قصة.</p>
    </div>
    <button onclick="next(1)">التالي</button>
  </div>

  <!-- الصفحة 2 -->
  <div class="page" id="p2">
    <div>
      <div class="heart">💌</div>
      <h1>اللحظة الأولى</h1>
      <p>من وقت ما عرفتك، صار كل شي مختلف.</p>
    </div>
    <button onclick="next(2)">التالي</button>
  </div>

  <!-- الصفحة 3 -->
  <div class="page" id="p3">
    <div>
      <div class="heart">✨</div>
      <h1>ذكريات</h1>
      <p>كل كلمة منك إلها معنى خاص عندي.</p>
    </div>
    <button onclick="next(3)">التالي</button>
  </div>

  <!-- الصفحة 4 -->
  <div class="page" id="p4">
    <div>
      <div class="heart">❤️</div>
      <h1>النهاية؟</h1>
      <p>يمكن مش نهاية… يمكن بداية أجمل شي.</p>
    </div>
    <button onclick="restart()">إعادة</button>
  </div>

</div>

<script>
let current = 1;

function next(n){
  document.getElementById("p"+n).style.transform="rotateY(-180deg)";
  document.getElementById("p"+(n+1)).style.transform="rotateY(0deg)";
  document.getElementById("p"+(n+1)).style.opacity="1";
}

function restart(){
  for(let i=1;i<=4;i++){
    document.getElementById("p"+i).style.transform="rotateY(180deg)";
    document.getElementById("p"+i).style.opacity = (i===1) ? "1" : "0";
  }
  document.getElementById("p1").style.transform="rotateY(0deg)";
}
</script>

</body>
</html>
